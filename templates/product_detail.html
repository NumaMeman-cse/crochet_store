<!DOCTYPE html>
<html>

<head>

<title>{{product.name}}</title>

</head>

<body>

<div class="container mt-5">

<div class="row">

<div class="col-md-6">

<img src="https://via.placeholder.com/400" class="img-fluid">

</div>

</div>

</html>
