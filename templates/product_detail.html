{% extends "base.html" %}

{% block content %}

<div class="row mt-4">

<!-- PRODUCT IMAGE -->

<div class="col-md-6 text-center">

<img src="{{product.image}}" class="img-fluid rounded shadow product-img">

</div>


<!-- PRODUCT INFO -->

<div class="col-md-6">

<h2 class="mb-3">{{product.name}}</h2>

<p class="text-muted">{{product.category}}</p>

<h3 class="text-success mb-3">₹ {{product.price}}</h3>

<p>{{product.description}}</p>

{% if product.stock > 0 %}

<span class="badge bg-success mb-3">In Stock</span>

{% else %}

<span class="badge bg-danger mb-3">Out of Stock</span>

{% endif %}

<div class="mt-4">

<a href="/add-to-cart/{{product.id}}" class="btn btn-success btn-lg">
Add to Cart
</a>

<a href="/products" class="btn btn-outline-dark btn-lg">
Back to Products
</a>

</div>

</div>

</div>


<style>

.product-img{
max-height:450px;
object-fit:cover;
}

</style>

{% endblock %}
