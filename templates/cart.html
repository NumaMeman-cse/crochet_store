<!DOCTYPE html>
<html>

<head>

<title>Your Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Your Cart</h2>

<table class="table">

<tr>
<th>Product</th>
<th>Price</th>
</tr>

{% for item in cart_items %}

<tr>
<td>{{item.name}}</td>
<td>₹ {{item.price}}</td>
</tr>

{% endfor %}

</table>

</div>

</body>

</html>
