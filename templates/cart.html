<!DOCTYPE html>
<html>

<head>

<title>Your Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Your Cart</h2>

<table class="table">

<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Subtotal</th>
<th>Action</th>
</tr>

{% for item in cart_items %}

<tr>

<td>{{item.product.name}}</td>

<td>₹ {{item.product.price}}</td>

<td>{{item.quantity}}</td>

<td>₹ {{item.subtotal}}</td>

<td>
<a href="/remove-from-cart/{{item.product.id}}" class="btn btn-danger btn-sm">
Remove
</a>
</td>

</tr>

{% endfor %}

</table>

<h4>Total: ₹ {{total_price}}</h4>

<a href="#" class="btn btn-success">
Proceed to Checkout
</a>

</div>

</body>

</html>
