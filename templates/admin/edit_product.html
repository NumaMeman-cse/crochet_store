<h2>Edit Product</h2>

<form method="POST">

<input name="name" value="{{product.name}}"><br><br>

<textarea name="description">{{product.description}}</textarea><br><br>

<input name="price" value="{{product.price}}"><br><br>

<input name="image" value="{{product.image}}"><br><br>

<input name="category" value="{{product.category}}"><br><br>

<input name="stock" value="{{product.stock}}"><br><br>

<button type="submit">Update Product</button>

</form>
